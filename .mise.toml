# Required dev tools for this repo.
# Install everything with: `mise install` (https://mise.jdx.dev/).
#
# `bd` is required because src/install.ts shells out to it and the test suite
# runs against the real binary — there is no mock or fake path. If you don't
# want to use mise, install beads manually so `bd` is on PATH:
#   curl -sSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash

[tools]
bun = "1.3"
beads = "1.0.2"
